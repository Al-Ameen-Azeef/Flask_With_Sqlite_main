{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Verify OTP & Reset Password</h2>

    <form method="POST">
        <input type="text" name="otp" placeholder="Enter OTP" required>
        <input type="password" name="password" placeholder="New Password" required>
        <button type="submit">Reset Password</button>
    </form>

</div>

{% endblock %}
