{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Edit Contact</h2>

    <form method="POST">
        <input type="text" name="name" value="{{ contact[1] }}" required>
        <input type="email" name="email" value="{{ contact[2] }}" required>
        <textarea name="message">{{ contact[3] }}</textarea>
        <button type="submit">Update</button>
    </form>
</div>

{% endblock %}
